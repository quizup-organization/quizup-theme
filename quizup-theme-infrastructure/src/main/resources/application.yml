spring:
  application:
    name: quizup-theme
  profiles:
    default: local

  flyway:
    locations: classpath:db/migration/theme

axon:
  distributed:
    enabled: true

microservice:
  swagger:
    description: QuizUp Theme Module - Quiz Topics and Questions management
  websocket:
    enabled: false

app:
  seed-data:
    enabled: false

logging:
  level:
    io.github.quizup: ${QUIZUP_LOG_LEVEL:INFO}
